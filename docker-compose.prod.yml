services:
  frotapro-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: always
    networks:
      - traefik-net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frotapro.rule=Host(`srv1443418.hstgr.cloud`)"
      - "traefik.http.routers.frotapro.entrypoints=websecure"
      - "traefik.http.routers.frotapro.tls=true"
      - "traefik.http.routers.frotapro.tls.certresolver=mytlschallenge"
      - "traefik.http.services.frotapro.loadbalancer.server.port=80"

  frotapro-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    env_file:
      - ./backend/.env
    networks:
      - traefik-net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frotapro-api.rule=Host(`srv1443418.hstgr.cloud`) && PathPrefix(`/api`)"
      - "traefik.http.routers.frotapro-api.entrypoints=websecure"
      - "traefik.http.routers.frotapro-api.tls=true"
      - "traefik.http.routers.frotapro-api.tls.certresolver=mytlschallenge"
      - "traefik.http.middlewares.strip-api.stripprefix.prefixes=/api"
      - "traefik.http.routers.frotapro-api.middlewares=strip-api"
      - "traefik.http.services.frotapro-api.loadbalancer.server.port=3001"

networks:
  traefik-net:
    external: true
    name: n8n_n8n-network
