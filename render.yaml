# Blueprint do Render — deploy do FuelTrack como UM servico so (site + API).
# O Render le este arquivo automaticamente ao criar um "Blueprint".
services:
  - type: web
    name: fueltrack
    runtime: node
    plan: free
    region: oregon
    # Instala e builda o frontend e instala o backend.
    # --include=dev no frontend garante o vite (devDependency), que o
    # NODE_ENV=production faria o npm pular, quebrando o build.
    buildCommand: cd frontend && npm install --include=dev && npm run build && cd ../backend && npm install
    # Sobe o servidor, que serve o site e a API juntos
    startCommand: node backend/src/server.js
    envVars:
      - key: NODE_ENV
        value: production
      # A tela chama a API em /api (mesmo endereco). Lida pelo Vite durante o build.
      - key: VITE_API_URL
        value: /api
      # Gerado automaticamente pelo Render (nao precisa preencher)
      - key: JWT_SECRET
        generateValue: true
      # Voce preenche estes 3 no painel do Render (do supabase.com -> Settings -> API)
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
